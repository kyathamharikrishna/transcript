services:
  - type: web
    name: transcribeflow-ai
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DB_BACKEND
        value: sqlite
      - key: SQLITE_DB_PATH
        value: uploads/transcriber/transcribeflow.sqlite
      - key: SHOW_ALL_TRANSCRIPTIONS
        value: "1"
      - key: TRANSCRIPTION_BACKEND
        value: auto
      - key: OPENAI_FALLBACK_TO_WHISPER
        value: "0"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TRANSCRIBE_MODEL
        value: whisper-1
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_TRANSCRIBE_MODEL
        value: whisper-large-v3-turbo
      - key: GROQ_TRANSLATION_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENAI_TRANSLATION_MODEL
        value: gpt-4o-mini
      - key: WHISPER_FP16
        value: "0"
      - key: ENABLE_TRANSFORMERS_SUMMARY
        value: "0"
      - key: MAX_UPLOAD_MB
        value: "25"
