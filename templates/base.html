<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TranscribeFlow AI{% endblock %}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="{% block body_class %}{% endblock %}">
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>
  <div class="ambient ambient-three"></div>
  <div class="grid-overlay"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  {% if session.get("user_email") %}
  <nav class="app-nav">
    <a class="brand" href="{{ url_for('dashboard') }}">
      <span class="brand-mark">TF</span>
      <span>TranscribeFlow</span>
    </a>
    <div class="nav-links">
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('history') }}">History</a>
      <a href="https://transcribeflow-ai.onrender.com/" target="_blank" rel="noreferrer">Live</a>
      <a class="nav-pill" href="{{ url_for('logout') }}">Logout</a>
    </div>
  </nav>
  {% endif %}

  <main class="page-shell">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
